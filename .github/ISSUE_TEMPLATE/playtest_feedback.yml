name: 公开试玩反馈
description: 反馈《深渊赌局》MVP 试玩体验、理解成本、重开欲望和愿望单意愿。
title: "[试玩反馈] "
labels:
  - playtest
  - feedback
body:
  - type: markdown
    attributes:
      value: |
        感谢试玩《深渊赌局》。这份表单只收集高信号问题，用来判断 MVP 是否已经足够支撑公开试玩和 Steam 愿望单转化。

  - type: input
    id: build_or_url
    attributes:
      label: 试玩入口或版本信息
      description: 粘贴你打开的试玩 URL；如果页面或测试说明提供了 commit / build SHA，也一起填上。
      placeholder: "例如：https://jollywu24.github.io/-/web/?seed=playtest-001 或 334031d"
    validations:
      required: true

  - type: dropdown
    id: understood_loop
    attributes:
      label: 你是否在第一局理解了基本玩法？
      description: 包括选牌、换牌、摊牌、目标分数和上头值。
      options:
        - 是，第一局就理解了
        - 大致理解，但还有几个数字看不懂
        - 没理解，需要说明
    validations:
      required: true

  - type: input
    id: understood_hype_at
    attributes:
      label: 你第几手开始理解“上头值会让我爆牌”？
      placeholder: "例如：第 2 手 / 第 1 局结束后 / 还没理解"
    validations:
      required: true

  - type: dropdown
    id: used_red_eye
    attributes:
      label: 你有没有主动使用红眼赌注？
      options:
        - 有，而且是主动想赌一把
        - 有，但只是想看看按钮会发生什么
        - 没有，因为风险太高
        - 没有，因为没看懂入口或规则
        - 没遇到红眼状态
    validations:
      required: true

  - type: dropdown
    id: restart_desire
    attributes:
      label: 失败或通关后，你想不想立刻再开一局？
      options:
        - 很想立刻重开
        - 有点想，但还不够强
        - 不太想
        - 没玩到失败或通关
    validations:
      required: true

  - type: dropdown
    id: wishlist_intent
    attributes:
      label: 如果这游戏上 Steam，你会愿望单吗？
      options:
        - 会
        - 可能会
        - 暂时不会
        - 不确定
    validations:
      required: true

  - type: textarea
    id: confusing_ui
    attributes:
      label: 哪个界面、数字或状态最看不懂？
      description: 例如上头值、红眼赌注、暗涌、结算收益、商店、失败原因、按钮状态。
      placeholder: "写最影响你继续玩的 1-3 个点。"
    validations:
      required: false

  - type: textarea
    id: most_memorable_moment
    attributes:
      label: 你最上头或最懊悔的一刻是什么？
      description: 这会帮助判断核心体验是否成立。
      placeholder: "例如：明知道快爆了还是点了红眼翻倍，结果暗涌翻到 K。"
    validations:
      required: false

  - type: textarea
    id: bugs_or_blockers
    attributes:
      label: 遇到的 bug、卡死或显示问题
      description: 如果能复现，请写 seed、操作步骤和浏览器。
      placeholder: "例如：Chrome，seed=xxx，换牌后右侧牌堆数量没更新。"
    validations:
      required: false
