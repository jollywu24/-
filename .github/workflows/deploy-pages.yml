name: Deploy Web MVP to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Inject build SHA
        run: |
          perl -0pi -e "s/window.__BUILD_SHA__ \|\| 'dev'/window.__BUILD_SHA__ || '${GITHUB_SHA::7}'/g" web/app.js

      - name: Prepare Pages artifact
        run: |
          mkdir -p dist-pages
          cp -R web dist-pages/web
          cp -R art dist-pages/art
          cp -R public dist-pages/public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
